name: Documentation checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check local Markdown links
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import unquote
          import re

          link_pattern = re.compile(r'!?\[[^\]]*\]\(([^)]+)\)')
          ignored_prefixes = ('#', '/', 'http://', 'https://', 'mailto:', 'tel:', 'data:')
          missing = []
          for markdown in Path('.').rglob('*.md'):
              text = markdown.read_text(encoding='utf-8')
              for raw_target in link_pattern.findall(text):
                  target = raw_target.split(maxsplit=1)[0].strip('<>')
                  if not target or target.startswith(ignored_prefixes):
                      continue
                  relative_path = unquote(target.split('#', 1)[0])
                  if relative_path and not (markdown.parent / relative_path).resolve().exists():
                      missing.append(f'{markdown}: {target}')
          if missing:
              raise SystemExit('Broken local Markdown links:\n' + '\n'.join(missing))
          print('All local Markdown links resolve.')
          PY
